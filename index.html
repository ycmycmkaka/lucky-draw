<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>萬能抽號器 🍀 & 六合彩抽號器 🎱</title>
    <style>
        /* 排版設定，等兩個卡片可以並排 */
        body { font-family: -apple-system, system-ui, sans-serif; padding: 20px; background: #f0f2f5; display: flex; justify-content: center; align-items: flex-start; gap: 20px; flex-wrap: wrap; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { color: #1c1e21; text-align: center; margin-bottom: 20px; font-size: 24px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; color: #4b4f56; font-size: 14px; }
        input { width: 100%; padding: 12px; border: 1.5px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        input:focus { border-color: #007aff; outline: none; }
        
        button { width: 100%; padding: 14px; background: #007aff; color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.2s; }
        button.m6-btn { background: #ff9500; } /* 六合彩專用掣顏色 */
        button:active { transform: scale(0.98); }
        
        .result-container { margin-top: 20px; background: #f8f9fa; border-radius: 12px; padding: 15px; display: none; }
        .result { white-space: pre-wrap; font-family: monospace; font-size: 14px; color: #333; line-height: 1.6; }
        
        /* 六合彩波波專屬樣式 */
        .ball { display: inline-block; width: 28px; height: 28px; line-height: 28px; text-align: center; border-radius: 50%; color: white; font-weight: bold; margin: 2px 4px; font-family: sans-serif; box-shadow: 1px 1px 3px rgba(0,0,0,0.2); }
        .ball-red { background: #ff3b30; }
        .ball-green { background: #34c759; }
        .ball-blue { background: #007aff; }
        .m6-row { display: flex; align-items: center; margin-bottom: 10px; flex-wrap: wrap; }
    </style>
</head>
<body>

<div class="card">
    <h2>萬能抽號器 🍀</h2>
    
    <div class="input-group">
        <label>1. 遊戲規則 (範圍 抽幾個)</label>
        <input type="text" id="rule" value="50 7">
    </div>
    <div class="input-group">
        <label>2. 排除數字 (空格分開)</label>
        <input type="text" id="exclude" placeholder="例如: 4 14 24 (冇就留空)">
    </div>
    <div class="input-group">
        <label>3. 單數數量 (可留空)</label>
        <input type="number" id="odds" placeholder="留空代表隨機">
    </div>
    <div class="input-group">
        <label>4. 相連組數 (可留空)</label>
        <input type="number" id="consec" placeholder="留空代表隨機">
    </div>
    <div class="input-group">
        <label>5. 抽幾多組？</label>
        <input type="number" id="batch" value="1">
    </div>

    <button onclick="generate()">立即抽號碼</button>

    <div id="result-container" class="result-container">
        <div id="result" class="result"></div>
    </div>
</div>

<div class="card">
    <h2>六合彩顏色抽號器 🎱</h2>
    
    <div class="input-group">
        <label>🔴 紅波數量</label>
        <input type="number" id="m6-red" placeholder="例如: 3 (留空代表隨機補位)">
    </div>
    <div class="input-group">
        <label>🟢 綠波數量</label>
        <input type="number" id="m6-green" placeholder="例如: 2 (留空代表隨機補位)">
    </div>
    <div class="input-group">
        <label>🔵 藍波數量</label>
        <input type="number" id="m6-blue" placeholder="留空代表隨機補位">
    </div>
    <div class="input-group">
        <label>🎲 抽幾多注？</label>
        <input type="number" id="m6-batch" value="1">
    </div>

    <button class="m6-btn" onclick="generateMarkSix()">立即抽六合彩</button>

    <div id="m6-result-container" class="result-container">
        <div id="m6-result" class="result"></div>
    </div>
</div>

<script>
// ==========================================
// 萬能抽號器邏輯
// ==========================================
function countConsecutive(nums) {
    let count = 0;
    for (let i = 0; i < nums.length - 1; i++) {
        if (nums[i+1] - nums[i] === 1) count++;
    }
    return count;
}

function generate() {
    const rule = document.getElementById('rule').value.trim().split(/\s+/);
    const maxNum = parseInt(rule[0]);
    const pick = parseInt(rule[1]);
    const exclude = document.getElementById('exclude').value.split(/\s+/).map(Number).filter(n => n > 0);
    
    const oddsStr = document.getElementById('odds').value.trim();
    const consecStr = document.getElementById('consec').value.trim();
    const useOdds = oddsStr !== '';
    const useConsec = consecStr !== '';
    const targetOdds = useOdds ? parseInt(oddsStr) : null;
    const targetConsec = useConsec ? parseInt(consecStr) : null;
    
    const batchCount = parseInt(document.getElementById('batch').value) || 1;
    
    const pool = [];
    for (let i = 1; i <= maxNum; i++) if (!exclude.includes(i)) pool.push(i);

    if (pool.length < pick) {
        alert("錯誤：號碼池唔夠號碼抽！"); return;
    }

    const oddsP = pool.filter(n => n % 2 !== 0);
    const evensP = pool.filter(n => n % 2 === 0);

    if (useOdds) {
        const targetEvens = pick - targetOdds;
        if (targetOdds < 0 || targetOdds > pick) {
            alert(`單數數量必須喺 0-${pick} 之間！`); return;
        }
        if (oddsP.length < targetOdds || evensP.length < targetEvens) {
            alert("錯誤：號碼池唔夠單/雙數！請檢查排除名單。"); return;
        }
    }

    let finalResults = [];
    for (let b = 0; b < batchCount; b++) {
        let found = false;
        for (let attempt = 0; attempt < 30000; attempt++) {
            let cand = [];
            if (useOdds) {
                let targetEvens = pick - targetOdds;
                let sOdds = oddsP.sort(() => Math.random() - 0.5).slice(0, targetOdds);
                let sEvens = evensP.sort(() => Math.random() - 0.5).slice(0, targetEvens);
                cand = [...sOdds, ...sEvens].sort((a, b) => a - b);
            } else {
                cand = pool.sort(() => Math.random() - 0.5).slice(0, pick).sort((a, b) => a - b);
            }

            if (useConsec) {
                if (countConsecutive(cand) === targetConsec) {
                    finalResults.push(`第 ${b+1} 組: ${cand.join(', ')}`);
                    found = true; break;
                }
            } else {
                finalResults.push(`第 ${b+1} 組: ${cand.join(', ')}`);
                found = true; break;
            }
        }
        if (!found) finalResults.push(`第 ${b+1} 組: 搵唔到合適組合`);
    }

    let conditionText = `(設定: 1-${maxNum}抽${pick}`;
    if (useOdds) conditionText += `, ${targetOdds}單${pick-targetOdds}雙`;
    if (useConsec) conditionText += `, 相連${targetConsec}組`;
    conditionText += `)`;

    document.getElementById('result-container').style.display = 'block';
    document.getElementById('result').innerText = finalResults.join('\n') + `\n\n` + conditionText;
}


// ==========================================
// 六合彩顏色抽號器邏輯
// ==========================================
const M6_RED = [1, 2, 7, 8, 12, 13, 18, 19, 23, 24, 29, 30, 34, 35, 40, 45];
const M6_BLUE = [3, 4, 9, 10, 14, 15, 20, 25, 26, 31, 36, 37, 41, 42, 47, 48];
const M6_GREEN = [5, 6, 11, 16, 17, 21, 22, 27, 28, 32, 33, 38, 39, 43, 44, 46, 49];

function generateMarkSix() {
    let rStr = document.getElementById('m6-red').value.trim();
    let gStr = document.getElementById('m6-green').value.trim();
    let bStr = document.getElementById('m6-blue').value.trim();
    let batch = parseInt(document.getElementById('m6-batch').value) || 1;

    // 將輸入轉做數字，留空就係 null
    let rCount = rStr !== '' ? parseInt(rStr) : null;
    let gCount = gStr !== '' ? parseInt(gStr) : null;
    let bCount = bStr !== '' ? parseInt(bStr) : null;

    // 計算總共指定咗幾多個波
    let specifiedTotal = (rCount || 0) + (gCount || 0) + (bCount || 0);

    if (specifiedTotal > 6) {
        alert("⚠️ 指定嘅波數量加埋唔可以超過 6 個！");
        return;
    }

    let finalResults = [];
    for (let b = 0; b < batch; b++) {
        let cand = [];
        let remainingPool = []; // 用嚟裝留空顏色嘅波

        // 1. 處理指定數量嘅顏色，留空就將該顏色放入 remainingPool
        if (rCount !== null) {
            if (rCount > M6_RED.length) { alert("⚠️ 紅波數量超過上限！"); return; }
            cand.push(...[...M6_RED].sort(() => Math.random() - 0.5).slice(0, rCount));
        } else {
            remainingPool.push(...M6_RED);
        }

        if (gCount !== null) {
            if (gCount > M6_GREEN.length) { alert("⚠️ 綠波數量超過上限！"); return; }
            cand.push(...[...M6_GREEN].sort(() => Math.random() - 0.5).slice(0, gCount));
        } else {
            remainingPool.push(...M6_GREEN);
        }

        if (bCount !== null) {
            if (bCount > M6_BLUE.length) { alert("⚠️ 藍波數量超過上限！"); return; }
            cand.push(...[...M6_BLUE].sort(() => Math.random() - 0.5).slice(0, bCount));
        } else {
            remainingPool.push(...M6_BLUE);
        }

        // 2. 抽剩餘需要嘅波
        let remainingPick = 6 - specifiedTotal;
        if (remainingPick > 0) {
            // 防呆：如果三隻色都填晒數字，但加埋唔夠 6 個 (例如 1紅 1綠 1藍)
            if (remainingPool.length === 0) {
                alert("⚠️ 你填晒三隻色，但加埋唔夠 6 個！\n請確保三個加埋等於 6，或者留空其中一啲色等系統補位。");
                return;
            }
            // 喺 remainingPool 隨機抽補位波
            cand.push(...remainingPool.sort(() => Math.random() - 0.5).slice(0, remainingPick));
        }

        // 3. 排好數字順序
        cand.sort((a, b) => a - b);
        
        // 4. 幫數字加上對應顏色嘅 CSS class
        let htmlBalls = cand.map(num => {
            let colorClass = M6_RED.includes(num) ? 'ball-red' : M6_GREEN.includes(num) ? 'ball-green' : 'ball-blue';
            return `<span class="ball ${colorClass}">${num}</span>`;
        }).join('');
        
        finalResults.push(`<div class="m6-row"><strong style="width: 70px;">第 ${b+1} 注：</strong> ${htmlBalls}</div>`);
    }

    // 整理底部顯示嘅設定條件
    let condArr = [];
    if (rCount !== null) condArr.push(`紅波x${rCount}`);
    if (gCount !== null) condArr.push(`綠波x${gCount}`);
    if (bCount !== null) condArr.push(`藍波x${bCount}`);
    
    let conditionText = `<div style="margin-top:15px; font-size:12px; color:#666; border-top:1px dashed #ccc; padding-top:10px;">(設定: ${condArr.length === 0 ? '完全隨機抽出 6 個波' : condArr.join(', ') + '，其餘隨機補位'})</div>`;

    document.getElementById('m6-result-container').style.display = 'block';
    document.getElementById('m6-result').innerHTML = finalResults.join('') + conditionText;
}
</script>

</body>
</html>
