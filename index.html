<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>萬能抽號器 🍀 & 六合彩抽號器 🎱</title>

<style>
body {
    font-family: -apple-system, system-ui, sans-serif;
    padding: 20px;
    background: #f0f2f5;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    gap: 20px;
    flex-wrap: wrap;
}

.card {
    background: white;
    padding: 25px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    width: 100%;
    max-width: 400px;
}

h2 {
    color: #1c1e21;
    text-align: center;
    margin-bottom: 20px;
    font-size: 24px;
}

.input-group {
    margin-bottom: 15px;
}

label {
    display: block;
    margin-bottom: 5px;
    font-weight: 600;
    color: #4b4f56;
    font-size: 14px;
}

input {
    width: 100%;
    padding: 12px;
    border: 1.5px solid #ddd;
    border-radius: 10px;
    box-sizing: border-box;
    font-size: 16px;
}

input:focus {
    border-color: #007aff;
    outline: none;
}

button {
    width: 100%;
    padding: 14px;
    background: #007aff;
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    margin-top: 10px;
    transition: 0.2s;
}

button.m6-btn {
    background: #ff9500;
}

button:active {
    transform: scale(0.98);
}

.result-container {
    margin-top: 20px;
    background: #f8f9fa;
    border-radius: 12px;
    padding: 15px;
    display: none;
}

.result {
    white-space: pre-wrap;
    font-family: monospace;
    font-size: 14px;
    color: #333;
    line-height: 1.6;
}

.ball {
    display: inline-block;
    width: 28px;
    height: 28px;
    line-height: 28px;
    text-align: center;
    border-radius: 50%;
    color: white;
    font-weight: bold;
    margin: 2px 4px;
    font-family: sans-serif;
    box-shadow: 1px 1px 3px rgba(0,0,0,0.2);
}

.ball-red {
    background: #ff3b30;
}

.ball-green {
    background: #34c759;
}

.ball-blue {
    background: #007aff;
}

.m6-row {
    display: flex;
    align-items: center;
    margin-bottom: 10px;
    flex-wrap: wrap;
}

.divider {
    height: 1px;
    background: #eee;
    margin: 20px 0;
}

.hint {
    font-size: 12px;
    color: #777;
    margin-top: 4px;
}
</style>
</head>

<body>

<div class="card">
    <h2>萬能抽號器 🍀</h2>

    <div class="input-group">
        <label>1. 遊戲規則：範圍 抽幾個</label>
        <input type="text" id="rule" value="50 7">
    </div>

    <div class="input-group">
        <label>2. 排除數字</label>
        <input type="text" id="exclude" placeholder="例如: 1-10 14 24">
    </div>

    <div class="divider"></div>

    <div class="input-group">
        <label>⭐ 指定號碼池</label>
        <input type="text" id="must-pool" placeholder="例如: 11 15 17 30 40 42 45">
        <div class="hint">由呢堆號碼入面強制抽指定數量</div>
    </div>

    <div class="input-group">
        <label>⭐ 指定號碼池必出幾個？</label>
        <input type="number" id="must-count" placeholder="例如: 1">
    </div>

    <div class="divider"></div>

    <div class="input-group">
        <label>3. 單數數量</label>
        <input type="number" id="odds" placeholder="留空代表隨機">
    </div>

    <div class="input-group">
        <label>4. 相連組數</label>
        <input type="number" id="consec" placeholder="留空代表隨機">
    </div>

    <div class="input-group">
        <label>5. 抽幾多組？</label>
        <input type="number" id="batch" value="1">
    </div>

    <button onclick="generate()">立即抽號碼</button>

    <div id="result-container" class="result-container">
        <div id="result" class="result"></div>
    </div>
</div>


<div class="card">
    <h2>六合彩顏色抽號器 🎱</h2>

    <div class="input-group">
        <label>🔴 紅波數量</label>
        <input type="number" id="m6-red" placeholder="留空代表隨機">
    </div>

    <div class="input-group">
        <label>🟢 綠波數量</label>
        <input type="number" id="m6-green" placeholder="留空代表隨機">
    </div>

    <div class="input-group">
        <label>🔵 藍波數量</label>
        <input type="number" id="m6-blue" placeholder="留空代表隨機">
    </div>

    <div class="divider"></div>

    <div class="input-group">
        <label>❌ 排除數字</label>
        <input type="text" id="m6-exclude" placeholder="例如: 4 14 24">
    </div>

    <div class="divider"></div>

    <div class="input-group">
        <label>⭐ 指定號碼池</label>
        <input type="text" id="m6-must-pool" placeholder="例如: 11 15 17 30 40 42 45">
        <div class="hint">例如 1-49 抽 6 個，其中 1 個一定來自呢堆號碼</div>
    </div>

    <div class="input-group">
        <label>⭐ 指定號碼池必出幾個？</label>
        <input type="number" id="m6-must-count" placeholder="例如: 1">
    </div>

    <div class="divider"></div>

    <div class="input-group">
        <label>🔢 單數數量</label>
        <input type="number" id="m6-odds" placeholder="留空代表隨機 0-6">
    </div>

    <div class="input-group">
        <label>🔗 相連組數</label>
        <input type="number" id="m6-consec" placeholder="留空代表隨機">
    </div>

    <div class="divider"></div>

    <div class="input-group">
        <label>🎲 抽幾多注？</label>
        <input type="number" id="m6-batch" value="1">
    </div>

    <button class="m6-btn" onclick="generateMarkSix()">立即抽六合彩</button>

    <div id="m6-result-container" class="result-container">
        <div id="m6-result" class="result"></div>
    </div>
</div>


<script>
// ===============================
// 共用工具
// ===============================
function parseNums(str, min, max) {
    if (!str || !str.trim()) return [];

    const result = [];

    str.trim().split(/\s+/).forEach(part => {
        // 支援 1-10、1~10、1–10
        const rangeMatch = part.match(/^(\d+)\s*[-~–]\s*(\d+)$/);

        if (rangeMatch) {
            let start = parseInt(rangeMatch[1]);
            let end = parseInt(rangeMatch[2]);

            if (start > end) {
                [start, end] = [end, start];
            }

            for (let n = start; n <= end; n++) {
                if (n >= min && n <= max) {
                    result.push(n);
                }
            }
        } else {
            const n = parseInt(part);

            if (Number.isInteger(n) && n >= min && n <= max) {
                result.push(n);
            }
        }
    });

    return [...new Set(result)];
}

// 正確 Fisher-Yates 洗牌，修正舊版 random 偏差問題
function shuffle(arr) {
    const copy = [...arr];

    for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
    }

    return copy;
}

function sample(arr, count) {
    return shuffle(arr).slice(0, count);
}

function countConsecutive(nums) {
    let count = 0;

    for (let i = 0; i < nums.length - 1; i++) {
        if (nums[i + 1] - nums[i] === 1) {
            count++;
        }
    }

    return count;
}


// ===============================
// 萬能抽號器
// ===============================
function generate() {
    const rule = document.getElementById('rule').value.trim().split(/\s+/);
    const maxNum = parseInt(rule[0]);
    const pick = parseInt(rule[1]);

    if (!maxNum || !pick || maxNum < 1 || pick < 1) {
        alert("請輸入正確遊戲規則，例如：50 7");
        return;
    }

    const exclude = parseNums(document.getElementById('exclude').value, 1, maxNum);

    const mustPoolInput = parseNums(document.getElementById('must-pool').value, 1, maxNum);
    const mustCountStr = document.getElementById('must-count').value.trim();
    const useMustPool = mustPoolInput.length > 0 && mustCountStr !== '';
    const mustCount = useMustPool ? parseInt(mustCountStr) : 0;

    const oddsStr = document.getElementById('odds').value.trim();
    const useOdds = oddsStr !== '';
    const targetOdds = useOdds ? parseInt(oddsStr) : null;

    const consecStr = document.getElementById('consec').value.trim();
    const useConsec = consecStr !== '';
    const targetConsec = useConsec ? parseInt(consecStr) : null;

    const batchCount = parseInt(document.getElementById('batch').value) || 1;

    if (useMustPool && (mustCount < 0 || mustCount > pick)) {
        alert(`指定號碼池必出數量必須喺 0-${pick} 之間！`);
        return;
    }

    if (useOdds && (targetOdds < 0 || targetOdds > pick)) {
        alert(`單數數量必須喺 0-${pick} 之間！`);
        return;
    }

    const pool = [];
    for (let i = 1; i <= maxNum; i++) {
        if (!exclude.includes(i)) {
            pool.push(i);
        }
    }

    const mustPool = mustPoolInput.filter(n => !exclude.includes(n));
    const normalPool = pool.filter(n => !mustPool.includes(n));

    if (pool.length < pick) {
        alert("錯誤：號碼池唔夠號碼抽！");
        return;
    }

    if (useMustPool) {
        if (mustPool.length < mustCount) {
            alert("錯誤：指定號碼池扣除排除數字後，唔夠號碼抽！");
            return;
        }

        if (normalPool.length < pick - mustCount) {
            alert("錯誤：普通號碼池唔夠補位！");
            return;
        }
    }

    const finalResults = [];

    for (let b = 0; b < batchCount; b++) {
        let found = false;

        for (let attempt = 0; attempt < 50000; attempt++) {
            let cand = [];

            if (useMustPool) {
                cand.push(...sample(mustPool, mustCount));
                cand.push(...sample(normalPool, pick - mustCount));
            } else {
                cand = sample(pool, pick);
            }

            cand.sort((a, b) => a - b);

            if (useOdds) {
                const oddCount = cand.filter(n => n % 2 !== 0).length;
                if (oddCount !== targetOdds) continue;
            }

            if (useConsec) {
                if (countConsecutive(cand) !== targetConsec) continue;
            }

            finalResults.push(`第 ${b + 1} 組: ${cand.join(', ')}`);
            found = true;
            break;
        }

        if (!found) {
            finalResults.push(`第 ${b + 1} 組: 條件太嚴，搵唔到合適組合`);
        }
    }

    let conditionText = `(設定: 1-${maxNum} 抽 ${pick}`;

    if (exclude.length > 0) {
        conditionText += `, 排除 [${exclude.join(',')}]`;
    }

    if (useMustPool) {
        conditionText += `, 指定池 [${mustPoolInput.join(',')}] 必出 ${mustCount} 個`;
    }

    if (useOdds) {
        conditionText += `, ${targetOdds}單${pick - targetOdds}雙`;
    }

    if (useConsec) {
        conditionText += `, 相連${targetConsec}組`;
    }

    conditionText += `)`;

    document.getElementById('result-container').style.display = 'block';
    document.getElementById('result').innerText =
        finalResults.join('\n') + `\n\n` + conditionText;
}


// ===============================
// 六合彩顏色抽號器
// ===============================
const M6_RED = [1, 2, 7, 8, 12, 13, 18, 19, 23, 24, 29, 30, 34, 35, 40, 45];
const M6_BLUE = [3, 4, 9, 10, 14, 15, 20, 25, 26, 31, 36, 37, 41, 42, 47, 48];
const M6_GREEN = [5, 6, 11, 16, 17, 21, 22, 27, 28, 32, 33, 38, 39, 43, 44, 46, 49];

function getM6ColorClass(num) {
    if (M6_RED.includes(num)) return 'ball-red';
    if (M6_GREEN.includes(num)) return 'ball-green';
    return 'ball-blue';
}

function generateMarkSix() {
    const rStr = document.getElementById('m6-red').value.trim();
    const gStr = document.getElementById('m6-green').value.trim();
    const bStr = document.getElementById('m6-blue').value.trim();

    const rCount = rStr !== '' ? parseInt(rStr) : null;
    const gCount = gStr !== '' ? parseInt(gStr) : null;
    const bCount = bStr !== '' ? parseInt(bStr) : null;

    const exclude = parseNums(document.getElementById('m6-exclude').value, 1, 49);

    const mustPoolInput = parseNums(document.getElementById('m6-must-pool').value, 1, 49);
    const mustCountStr = document.getElementById('m6-must-count').value.trim();
    const useMustPool = mustPoolInput.length > 0 && mustCountStr !== '';
    const mustCount = useMustPool ? parseInt(mustCountStr) : 0;

    const oddsStr = document.getElementById('m6-odds').value.trim();
    const useOdds = oddsStr !== '';
    const targetOdds = useOdds ? parseInt(oddsStr) : null;

    const consecStr = document.getElementById('m6-consec').value.trim();
    const useConsec = consecStr !== '';
    const targetConsec = useConsec ? parseInt(consecStr) : null;

    const batch = parseInt(document.getElementById('m6-batch').value) || 1;

    if (rCount !== null && (rCount < 0 || rCount > 6)) {
        alert("紅波數量必須喺 0-6 之間！");
        return;
    }

    if (gCount !== null && (gCount < 0 || gCount > 6)) {
        alert("綠波數量必須喺 0-6 之間！");
        return;
    }

    if (bCount !== null && (bCount < 0 || bCount > 6)) {
        alert("藍波數量必須喺 0-6 之間！");
        return;
    }

    const specifiedColorTotal = (rCount || 0) + (gCount || 0) + (bCount || 0);

    if (specifiedColorTotal > 6) {
        alert("指定嘅紅綠藍波數量加埋唔可以超過 6 個！");
        return;
    }

    if (useMustPool && (mustCount < 0 || mustCount > 6)) {
        alert("指定號碼池必出數量必須喺 0-6 之間！");
        return;
    }

    if (useOdds && (targetOdds < 0 || targetOdds > 6)) {
        alert("單數數量必須喺 0-6 之間！");
        return;
    }

    const pool = [];
    for (let i = 1; i <= 49; i++) {
        if (!exclude.includes(i)) {
            pool.push(i);
        }
    }

    const mustPool = mustPoolInput.filter(n => !exclude.includes(n));
    const normalPool = pool.filter(n => !mustPool.includes(n));

    if (pool.length < 6) {
        alert("排除數字後，號碼池唔夠抽 6 個！");
        return;
    }

    if (useMustPool) {
        if (mustPool.length < mustCount) {
            alert("指定號碼池扣除排除數字後，唔夠號碼抽！");
            return;
        }

        if (normalPool.length < 6 - mustCount) {
            alert("普通號碼池唔夠補位！");
            return;
        }
    }

    const finalResults = [];

    for (let b = 0; b < batch; b++) {
        let found = false;

        for (let attempt = 0; attempt < 100000; attempt++) {
            let cand = [];

            if (useMustPool) {
                cand.push(...sample(mustPool, mustCount));
                cand.push(...sample(normalPool, 6 - mustCount));
            } else {
                cand = sample(pool, 6);
            }

            cand.sort((a, b) => a - b);

            const redNow = cand.filter(n => M6_RED.includes(n)).length;
            const greenNow = cand.filter(n => M6_GREEN.includes(n)).length;
            const blueNow = cand.filter(n => M6_BLUE.includes(n)).length;

            if (rCount !== null && redNow !== rCount) continue;
            if (gCount !== null && greenNow !== gCount) continue;
            if (bCount !== null && blueNow !== bCount) continue;

            if (useOdds) {
                const oddNow = cand.filter(n => n % 2 !== 0).length;
                if (oddNow !== targetOdds) continue;
            }

            if (useConsec) {
                if (countConsecutive(cand) !== targetConsec) continue;
            }

            const htmlBalls = cand.map(num => {
                return `<span class="ball ${getM6ColorClass(num)}">${num}</span>`;
            }).join('');

            finalResults.push(
                `<div class="m6-row"><strong style="width:70px;">第 ${b + 1} 注：</strong>${htmlBalls}</div>`
            );

            found = true;
            break;
        }

        if (!found) {
            finalResults.push(
                `<div class="m6-row"><strong style="width:70px;">第 ${b + 1} 注：</strong><span style="color:#ff3b30;">條件太嚴苛，搵唔到合適組合 😢</span></div>`
            );
        }
    }

    const condArr = [];

    if (exclude.length > 0) {
        condArr.push(`排除 [${exclude.join(',')}]`);
    }

    if (useMustPool) {
        condArr.push(`指定池 [${mustPoolInput.join(',')}] 必出 ${mustCount} 個`);
    }

    if (rCount !== null) {
        condArr.push(`紅x${rCount}`);
    }

    if (gCount !== null) {
        condArr.push(`綠x${gCount}`);
    }

    if (bCount !== null) {
        condArr.push(`藍x${bCount}`);
    }

    if (useOdds) {
        condArr.push(`${targetOdds}單${6 - targetOdds}雙`);
    }

    if (useConsec) {
        condArr.push(`相連${targetConsec}組`);
    }

    const conditionText = `
        <div style="margin-top:15px; font-size:12px; color:#666; border-top:1px dashed #ccc; padding-top:10px;">
            設定：${condArr.length === 0 ? '完全隨機抽出 6 個波' : condArr.join(' | ')}
        </div>
    `;

    document.getElementById('m6-result-container').style.display = 'block';
    document.getElementById('m6-result').innerHTML =
        finalResults.join('') + conditionText;
}
</script>

</body>
</html>
